<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>霓虹战机 · Neon Fighter</title>
  <script>
    // GitHub Pages SPA 路由回退
    // 当用户直接访问 /game 等子路由时，GitHub Pages 返回此 404 页面
    // 将原始路径存入 sessionStorage，然后重定向到 index.html
    sessionStorage.redirect = location.pathname + location.search + location.hash;
    location.replace('/');
  </script>
</head>
<body></body>
</html>
